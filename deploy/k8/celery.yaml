apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  labels:
    app: celery-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: ledger-api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "config", "worker", "--loglevel=info", "-Q", "webhooks"]
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: config.settings.base
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              value: ledger_prod
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: secure_password_here
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/1
